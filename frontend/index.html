<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Help - Complete Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo">
                <div class="logo-icon">🌋</div>
                <h1>SMART CITY <span class="logo-accent">DISPATCH</span></h1>
            </div>
            <div class="status-indicator">
                <div class="pulse-dot"></div>
                <span>SYSTEM ONLINE</span>
            </div>
        </div>
        <div class="nav-right">
            <div class="clock" id="clock">00:00:00</div>
            <div class="user-badge">OPERATOR ID: 9942</div>
        </div>
    </header>

    <div class="main-container">
        
        <!-- LEFT: Call Intake & Processing -->
        <section class="panel panel-left" id="intake-panel">
            <div class="panel-head">
                <div class="panel-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
                    </svg>
                </div>
                <h2>Live Call Intake</h2>
            </div>
            <div class="panel-body">
                
                <div class="input-group">
                    <label for="transcript-input">Incoming 911 Transcript</label>
                    <textarea id="transcript-input" placeholder="Type or paste the raw emergency call transcript here..."></textarea>
                </div>

                <div class="preset-buttons">
                    <button class="preset-btn" data-preset="fire1">🔥 Mall Fire (Caller 1)</button>
                    <button class="preset-btn" data-preset="fire2">🔥 Mall Fire (Caller 2)</button>
                    <button class="preset-btn" data-preset="medical">🚑 Medical Emer.</button>
                    <button class="preset-btn" data-preset="fire3">🔥 Mall Fire (Caller 3)</button>
                    <button class="preset-btn" data-preset="gas">⚠️ Gas Leak</button>
                </div>

                <button id="dispatch-btn" class="btn-primary" disabled>
                    <span class="btn-text">DISPATCH CALL</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>

                <!-- Chain of Thought Box -->
                <div id="cot-box" class="cot-container hidden">
                    <div class="cot-header" id="cot-toggle">
                        <div class="cot-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <polyline points="4 7 4 4 20 4 20 7"/>
                                <line x1="9" y1="20" x2="15" y2="20"/>
                                <line x1="12" y1="4" x2="12" y2="20"/>
                            </svg>
                            AI Reasoning
                        </div>
                        <svg class="cot-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </div>
                    <div id="cot-content" class="cot-content">
                        <!-- Filled by JS -->
                    </div>
                </div>

            </div>
        </section>

        <!-- RIGHT: Live Incident Board -->
        <section class="panel panel-right" id="board-panel">
            <div class="panel-head">
                <div class="panel-icon icon-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
                <h2>Live Incident Board</h2>
                <button id="reset-btn" class="btn-reset" title="Clear all incidents">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    RESET DEMO
                </button>
            </div>
            <div class="panel-body" id="board-body">
                <div id="incident-list" class="incident-list">
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">🛡️</div>
                        <h3>System Ready</h3>
                        <p>Awaiting incoming emergency calls...</p>
                    </div>
                </div>
            </div>
            
            <!-- Bottom Stats Bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">TOTAL INCIDENTS</span>
                    <span class="stat-value" id="stat-incidents">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">CALLS PROCESSED</span>
                    <span class="stat-value" id="stat-calls">0</span>
                </div>
            </div>
        </section>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
