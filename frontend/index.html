<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart City Emergency Dispatch System — Agent 1 Intake & Triage Dashboard">
    <title>DispatchAI — Agent 1 Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ─── Ambient Background ─── -->
    <div class="ambient-bg">
        <div class="grid-lines"></div>
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <!-- ─── Top Header Bar ─── -->
    <header id="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>DISPATCH<span>AI</span></h1>
                    <p>Agent 1 — Intake &amp; Triage</p>
                </div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-stat" id="stat-status">
                <span class="dot dot-green"></span>
                <span>SYSTEM ONLINE</span>
            </div>
            <div class="header-stat">
                <span class="label">Incidents</span>
                <span class="value" id="stat-incidents">0</span>
            </div>
            <div class="header-stat">
                <span class="label">Calls</span>
                <span class="value" id="stat-calls">0</span>
            </div>
            <div class="header-stat clock" id="clock">00:00:00</div>
        </div>
    </header>

    <!-- ─── Main Content ─── -->
    <main id="main">

        <!-- LEFT: 911 Call Simulator -->
        <section class="panel panel-left" id="simulator-panel">
            <div class="panel-head">
                <div class="panel-icon icon-red">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                    </svg>
                </div>
                <h2>911 Call Simulator</h2>
            </div>

            <div class="panel-body">
                <label for="transcript-input" class="field-label">Raw Transcript</label>
                <textarea
                    id="transcript-input"
                    placeholder="Type or paste a 911 call transcript..."
                    rows="7"
                    spellcheck="false"
                ></textarea>

                <button id="dispatch-btn" class="btn-dispatch" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    <span class="btn-text">DISPATCH CALL</span>
                    <div class="spinner hidden"></div>
                </button>

                <!-- Preset Buttons -->
                <div class="presets">
                    <p class="presets-label">Quick Load Presets</p>
                    <div class="preset-grid">
                        <button class="preset-btn" data-preset="fire1">
                            <span class="preset-dot dot-sev4"></span>
                            Mall Fire — Caller 1
                        </button>
                        <button class="preset-btn" data-preset="fire2">
                            <span class="preset-dot dot-sev4"></span>
                            Mall Fire — Caller 2
                        </button>
                        <button class="preset-btn" data-preset="medical">
                            <span class="preset-dot dot-sev3"></span>
                            Medical Emergency
                        </button>
                        <button class="preset-btn" data-preset="fire3">
                            <span class="preset-dot dot-sev4"></span>
                            Mall Fire — Caller 3
                        </button>
                        <button class="preset-btn" data-preset="gas">
                            <span class="preset-dot dot-sev3"></span>
                            Gas Leak at Mall
                        </button>
                    </div>
                </div>

                <!-- Chain of Thought -->
                <div class="cot-box hidden" id="cot-box">
                    <button class="cot-toggle" id="cot-toggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
                        </svg>
                        Agent 1 Reasoning
                        <svg class="cot-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    <div class="cot-content collapsed" id="cot-content"></div>
                </div>

                <!-- Duplicate indicator -->
                <div class="merge-indicator hidden" id="merge-indicator">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span id="merge-text">MERGED into existing incident</span>
                </div>
            </div>
        </section>

        <!-- RIGHT: Live Incident Board -->
        <section class="panel panel-right" id="board-panel">
            <div class="panel-head">
                <div class="panel-icon icon-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
                <h2>Live Incident Board</h2>
                <button id="reset-btn" class="btn-reset" title="Clear all incidents">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                    </svg>
                    RESET DEMO
                </button>
            </div>
            <div class="panel-body" id="board-body">
                <div id="incident-list" class="incident-list">
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" width="56" height="56">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                        </div>
                        <h3>No Active Incidents</h3>
                        <p>Submit a 911 call to begin triage processing</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="/static/app.js?v=1.1"></script>
</body>
</html>
